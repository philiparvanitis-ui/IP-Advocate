
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');
  .agent-wrap { font-family: 'DM Sans', sans-serif; max-width: 680px; padding: 0 0 2rem; }
  .agent-header { border-bottom: 0.5px solid var(--color-border-tertiary); padding: 1.5rem 0 1.25rem; }
  .agent-header-inner { display: flex; align-items: flex-start; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-weight: 500; font-size: 14px; color: #085041; flex-shrink: 0; border: 0.5px solid #9FE1CB; font-family: 'DM Serif Display', serif; }
  .agent-meta { flex: 1; }
  .agent-name { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--color-text-primary); margin: 0 0 2px; }
  .agent-title { font-size: 12px; color: var(--color-text-secondary); margin: 0; letter-spacing: 0.02em; }
  .advocate-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; border: 0.5px solid #9FE1CB; white-space: nowrap; align-self: flex-start; margin-top: 2px; }
  .segment-toggle { display: flex; gap: 6px; margin-top: 10px; }
  .seg-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 4px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.15s; }
  .seg-btn.active { background: #E1F5EE; color: #085041; border-color: #9FE1CB; font-weight: 500; }
  .progress-row { display: flex; gap: 5px; margin-top: 0.75rem; }
  .pip { height: 3px; flex: 1; border-radius: 2px; background: var(--color-border-tertiary); transition: background 0.3s; }
  .pip.done { background: #1D9E75; }
  .pip.active { background: #378ADD; }
  .chat-area { padding: 1.25rem 0 0; display: flex; flex-direction: column; gap: 1rem; min-height: 240px; }
  .msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp 0.3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: #E1F5EE; color: #085041; font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 0.5px solid #9FE1CB; font-family: 'DM Serif Display', serif; }
  .msg-avatar.user-av { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); font-family: 'DM Sans', sans-serif; font-size: 10px; }
  .bubble { max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; color: var(--color-text-primary); background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); }
  .bubble.user { background: #E1F5EE; border-color: #9FE1CB; color: #04342C; }
  .options-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .opt-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .opt-btn:hover { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
  .opt-btn:disabled { opacity: 0.4; cursor: default; }
  .input-row { display: flex; gap: 8px; margin-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 1rem; }
  .text-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
  .text-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px #E1F5EE; }
  .send-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 16px; border-radius: var(--border-radius-md); border: 0.5px solid #1D9E75; background: #E1F5EE; color: #04342C; cursor: pointer; font-weight: 500; transition: background 0.15s; }
  .send-btn:hover { background: #9FE1CB; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }
  .summary-card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-top: 0.5rem; }
  .summary-title { font-family: 'DM Serif Display', serif; font-size: 15px; margin: 0 0 12px; color: var(--color-text-primary); }
  .summary-row { display: flex; gap: 8px; font-size: 13px; padding: 6px 0; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: flex-start; }
  .summary-row:last-of-type { border-bottom: none; }
  .summary-label { color: var(--color-text-secondary); min-width: 130px; flex-shrink: 0; }
  .summary-val { color: var(--color-text-primary); font-weight: 500; }
  .solution-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .sol-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #E1F5EE; color: #085041; border: 0.5px solid #9FE1CB; font-weight: 500; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--color-text-secondary); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
  .restart-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; margin-top: 0.75rem; display: block; }
  .restart-btn:hover { color: var(--color-text-primary); }
</style>

<div class="agent-wrap">
  <h2 class="sr-only">IP Strategy Discovery Agent — Phil Arvanitis, Clarivate Corporate Patents & Trademarks</h2>

  <div class="agent-header">
    <div class="agent-header-inner">
      <div class="avatar">PA</div>
      <div class="agent-meta">
        <p class="agent-name">Phil Arvanitis</p>
        <p class="agent-title">Director, Market Development · Corporate IP · Clarivate</p>
      </div>
      <span class="advocate-badge">IP market advocate</span>
    </div>

    <div class="segment-toggle" id="segToggle">
      <button class="seg-btn active" id="btnPatents" onclick="switchSegment('patents')">Corporate Patents</button>
      <button class="seg-btn" id="btnTrademarks" onclick="switchSegment('trademarks')">Corporate Trademarks</button>
    </div>

    <div class="progress-row" id="progress"></div>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-row">
    <input class="text-input" id="userInput" type="text" placeholder="Type your answer or choose an option above…" />
    <button class="send-btn" id="sendBtn" onclick="handleSend()">Send ↗</button>
  </div>
</div>

<script>
const SEGMENTS = {
  patents: {
    label: "Corporate Patents",
    persona: "Phil Arvanitis, Director of Market Development for Corporate Patents at Clarivate",
    context: `Clarivate solutions for corporate patent teams:
- IPfolio / FoundationIP / IPMS: patent portfolio management software (built on Salesforce, zero failed implementations, automates renewals, due dates, reporting, integrates with Derwent and Innography)
- Derwent Innovation: patent intelligence and competitive landscape analytics using Derwent World Patents Index (58M+ patent families, 59 authorities)
- Innography: patent analytics for freedom-to-operate, landscape analysis, litigation risk, portfolio valuation
- Annuities / Renewals: global renewal payment management ($2B processed annually)
- PISA (Patent Intelligence & Strategy Analysis): analyst-led strategic portfolio reviews
- Darts-ip: IP litigation intelligence and case law database (5M+ global records)

Key market dynamics in Corporate Patents 2025-2026:
- AI-driven patent strategy evaluation becoming standard; IP teams under pressure to justify ROI of portfolios to CFOs
- M&A activity increasing demand for rapid portfolio valuation and FTO analysis
- Companies restructuring IP strategy post-pandemic and in response to new business pivots (e.g. EV, AI)
- Cost pressure: average Fortune 500 company spends $5-15M annually on patent renewals alone; many unaware of portfolio deadweight
- Increasing need to align patent portfolio to corporate R&D and business strategy — not just maintain what exists`,
    questions: [
      { id: "portfolio_type", label: "Portfolio type & scale", prompt: "What does your patent portfolio look like — and roughly how large is it?", options: ["Under 500 patents", "500–2,000 patents", "2,000–10,000 patents", "Over 10,000 patents globally"] },
      { id: "pain_point", label: "Core pain point", prompt: "What's taking up most of your IP team's time right now?", options: ["Renewal & annuity admin", "Portfolio analytics & strategy", "Prosecution & docketing", "Evaluate new AI solutions", "Cost visibility & reporting to leadership"] },
      { id: "geography", label: "Geographic footprint", prompt: "Where are the majority of your filings geographically?", options: ["Primarily US", "Primarily Europe", "Primarily Asia-Pacific", "Globally distributed"] },
      { id: "strategic_priority", label: "Strategic priority", prompt: "What's the single biggest strategic priority for your IP function this year?", options: ["Cost reduction & portfolio pruning", "Competitive intelligence", "Align portfolio to new business strategy", "IP monetisation & licensing", "M&A due diligence"] },
      { id: "buying_stage", label: "Buying stage", prompt: "Where are you in terms of evaluating new solutions?", options: ["Actively evaluating solutions", "Building a business case", "Exploring what's possible", "Just benchmarking"] }
    ],
    intro: "Thanks for connecting. I focus my time on corporate patent teams — specifically helping IP leaders understand where the market is heading and where there are opportunities to do more with their portfolio.\n\nI'd like to ask you five quick questions to understand your situation before sharing anything. Sound good?\n\nLet's start with the basics:"
  },
  trademarks: {
    label: "Corporate Trademarks",
    persona: "Phil Arvanitis, Director of Market Development for Corporate Trademarks at Clarivate",
    context: `Clarivate solutions for corporate trademark teams:
- CompuMark: industry-standard trademark search and watch solution — powered by 188+ trademark authority databases, AI-enhanced risk prioritisation (RiskMark), Brand Landscape Analyzer, Watch Analyzer with Darts-ip litigation integration
- IPfolio / FoundationIP: trademark lifecycle management software integrated with CompuMark data — automates watch orders, due dates, office actions, domain workflows; built on Salesforce
- Renewals / Trademark Admin: managed trademark renewal and recordal services with global agent network
- Darts-ip: 5M+ global IP case law records including trademark disputes — used to assess litigation risk and precedent
- Brand Intelligence: trademark analytics and competitive monitoring

Key market dynamics in Corporate Trademarks 2025-2026:
- Trademark leaders being asked to make faster, higher-impact decisions with less tolerance for uncertainty — budget accountability, portfolio prioritisation, global brand risk
- AI-enhanced trademark watch (RiskMark, Clarivate Global Trademark AI Search) reducing false positives and accelerating risk decisions
- Brand portfolio complexity increasing as companies expand into new geographies and digital channels
- M&A and brand acquisition activity requiring rapid clearance and risk assessment
- Pressure to reduce external counsel costs by bringing more work in-house with better tooling`,
    questions: [
      { id: "portfolio_type", label: "Portfolio type & scale", prompt: "What does your trademark portfolio look like?", options: ["Under 200 marks", "200–1,000 marks", "1,000–5,000 marks", "Over 5,000 marks globally"] },
      { id: "pain_point", label: "Core pain point", prompt: "What's taking up most of your trademark team's time right now?", options: ["Clearance searches & watch", "Renewal & maintenance admin", "Evaluate new AI solutions", "Managing outside counsel costs", "Global brand risk & monitoring"] },
      { id: "geography", label: "Geographic footprint", prompt: "Where are the majority of your trademark filings?", options: ["Primarily US", "Primarily Europe", "Primarily Asia-Pacific", "Globally distributed"] },
      { id: "strategic_priority", label: "Strategic priority", prompt: "What's the single biggest strategic priority for your trademark function this year?", options: ["Cost reduction", "Align portfolio to new business strategy", "Brand risk & enforcement", "Faster time-to-clearance", "IP monetisation & licensing"] },
      { id: "buying_stage", label: "Buying stage", prompt: "Where are you in terms of evaluating new solutions?", options: ["Actively evaluating solutions", "Building a business case", "Exploring what's possible", "Just benchmarking"] }
    ],
    intro: "Thanks for connecting. I spend most of my time with corporate trademark teams — understanding the pressures they're under and where the market is moving around brand risk, AI-enhanced search, and portfolio management.\n\nFive quick questions to understand your situation before I share anything relevant. Ready?\n\nLet's start:"
  }
};

let currentSegment = 'patents';
let answers = {};
let currentQ = -1;
let optionsDisabled = false;
let isLoading = false;

const chat = document.getElementById("chat");
const progress = document.getElementById("progress");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

function seg() { return SEGMENTS[currentSegment]; }

function switchSegment(s) {
  if (isLoading) return;
  currentSegment = s;
  document.getElementById('btnPatents').className = 'seg-btn' + (s === 'patents' ? ' active' : '');
  document.getElementById('btnTrademarks').className = 'seg-btn' + (s === 'trademarks' ? ' active' : '');
  restartAgent();
}

function buildProgress() {
  progress.innerHTML = '';
  const qs = seg().questions;
  for (let i = 0; i < qs.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < currentQ ? ' done' : i === currentQ ? ' active' : '');
    progress.appendChild(pip);
  }
}

function addMessage(text, role, options) {
  const msg = document.createElement('div');
  msg.className = 'msg ' + (role === 'user' ? 'user' : '');
  const av = document.createElement('div');
  av.className = 'msg-avatar' + (role === 'user' ? ' user-av' : '');
  av.textContent = role === 'user' ? 'You' : 'PA';
  const bub = document.createElement('div');
  bub.className = 'bubble' + (role === 'user' ? ' user' : '');
  bub.innerHTML = text.replace(/\n/g, '<br>');
  if (options && options.length) {
    const row = document.createElement('div');
    row.className = 'options-row';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.onclick = () => { if (optionsDisabled) return; disableOptions(); handleAnswer(opt); };
      row.appendChild(btn);
    });
    bub.appendChild(row);
  }
  msg.appendChild(av);
  msg.appendChild(bub);
  chat.appendChild(msg);
  msg.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return bub;
}

function addTyping() {
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.id = 'typing-indicator';
  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'PA';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msg.appendChild(av);
  msg.appendChild(bub);
  chat.appendChild(msg);
  msg.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function disableOptions() {
  optionsDisabled = true;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
}

function pickSolutions(ans, segment) {
  if (segment === 'patents') {
    const pain = ans['Core pain point'] || '';
    const priority = ans['Strategic priority'] || '';
    const size = ans['Portfolio type & scale'] || '';
    let sols = [];
    if (pain.includes('analytics') || pain.includes('AI') || priority.includes('Competitive') || priority.includes('business strategy')) { sols.push('Derwent Innovation'); sols.push('IPfolio'); }
    else if (pain.includes('Renewal') || priority.includes('Cost')) { sols.push('IPfolio'); sols.push('Annuities'); }
    else if (priority.includes('M&A')) { sols.push('Innography'); sols.push('Darts-ip'); }
    else if (priority.includes('monetisation')) { sols.push('PISA'); sols.push('Derwent Innovation'); }
    else { sols.push('IPfolio'); sols.push('Derwent Innovation'); }
    return [...new Set(sols)].slice(0, 2);
  } else {
    const pain = ans['Core pain point'] || '';
    const priority = ans['Strategic priority'] || '';
    let sols = [];
    if (pain.includes('Clearance') || pain.includes('AI') || priority.includes('Faster')) { sols.push('CompuMark'); sols.push('IPfolio'); }
    else if (pain.includes('Renewal') || priority.includes('Cost')) { sols.push('IPfolio'); sols.push('Renewals'); }
    else if (pain.includes('risk') || priority.includes('enforcement')) { sols.push('CompuMark Watch'); sols.push('Darts-ip'); }
    else if (priority.includes('business strategy')) { sols.push('CompuMark'); sols.push('IPfolio'); }
    else { sols.push('CompuMark'); sols.push('IPfolio'); }
    return [...new Set(sols)].slice(0, 2);
  }
}

async function getAgentResponse(userAnswer, questionIndex, allAnswers) {
  const qs = seg().questions;
  const isFinal = questionIndex === qs.length - 1;
  const solutions = isFinal ? pickSolutions(allAnswers, currentSegment) : [];

  const systemPrompt = `You are ${seg().persona}. You are a market advocate — not a salesperson. Your tone is warm, intellectually curious, and peer-level. You speak as someone who genuinely understands corporate IP strategy and wants to share market insight.

${seg().context}

You have asked question ${questionIndex + 1} of 5. The user answered: "${userAnswer}".
All answers so far: ${JSON.stringify(allAnswers)}

${isFinal
  ? `This is the final question. Write a warm, specific 3-sentence closing that: (1) names the pattern you see across all five of their answers, (2) recommends exactly these two solutions: ${solutions.join(' and ')} — explain why each fits their specific profile in one clause, (3) offers to share a tailored market perspective or arrange a follow-up. No bullet points. Sound like a trusted peer, not a product sheet.`
  : `Write a 2-sentence response: (1) acknowledge their answer with a specific market observation genuinely relevant to what they said — reference a real trend or pressure point, (2) bridge naturally to the next question without stating the question (that will follow separately). No bullet points.`}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 280,
        system: systemPrompt,
        messages: [{ role: "user", content: userAnswer }]
      })
    });
    const data = await response.json();
    return data.content?.[0]?.text || "Thanks for sharing that — it's a pattern I see across many corporate IP teams right now.";
  } catch (e) {
    return "Thanks for that. It's something I hear frequently from corporate IP leaders at the moment.";
  }
}

async function handleAnswer(answer) {
  if (currentQ < 0 || isLoading) return;
  const qs = seg().questions;
  if (currentQ >= qs.length) return;

  const q = qs[currentQ];
  answers[q.id] = answer;
  answers[q.label] = answer;

  addMessage(answer, 'user');
  input.value = '';
  isLoading = true;
  sendBtn.disabled = true;
  addTyping();

  const responseText = await getAgentResponse(answer, currentQ, answers);
  removeTyping();
  isLoading = false;
  sendBtn.disabled = false;

  currentQ++;
  buildProgress();

  if (currentQ < qs.length) {
    const next = qs[currentQ];
    addMessage(responseText + "\n\n" + next.prompt, 'agent', next.options);
    optionsDisabled = false;
  } else {
    addMessage(responseText, 'agent');
    showSummary();
  }
}

function handleSend() {
  const val = input.value.trim();
  if (!val || isLoading || currentQ < 0) return;
  disableOptions();
  handleAnswer(val);
}

input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });

function showSummary() {
  setTimeout(() => {
    const qs = seg().questions;
    const sols = pickSolutions(answers, currentSegment);
    const card = document.createElement('div');
    card.className = 'summary-card';

    let rows = qs.map(q => answers[q.label]
      ? `<div class="summary-row"><span class="summary-label">${q.label}</span><span class="summary-val">${answers[q.label]}</span></div>`
      : '').join('');

    let pills = sols.map(s => `<span class="sol-pill">${s}</span>`).join('');

    card.innerHTML = `<p class="summary-title">Your IP profile — ${seg().label}</p>${rows}
      <div class="summary-row" style="flex-direction:column; border-bottom:none; padding-top:10px;">
        <span class="summary-label" style="margin-bottom:6px;">Recommended solutions</span>
        <div class="solution-pills">${pills}</div>
      </div>
      <button class="restart-btn" onclick="restartAgent()">Start a new conversation ↺</button>`;

    chat.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 400);
}

function restartAgent() {
  answers = {};
  currentQ = -1;
  optionsDisabled = false;
  isLoading = false;
  chat.innerHTML = '';
  startAgent();
}

function startAgent() {
  setTimeout(() => {
    currentQ = 0;
    buildProgress();
    const qs = seg().questions;
    addMessage(seg().intro + "\n\n" + qs[0].prompt, 'agent', qs[0].options);
    optionsDisabled = false;
  }, 350);
}

startAgent();
</script>
